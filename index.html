<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SportPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0c0f14;--surface:#141820;--border:#242a35;--muted:#3d4557;--dim:#6b7590;
    --text:#e8ecf4;--subtext:#8a93aa;
    --cricket:#1a3a2a;--cricket-accent:#22c55e;
    --f1:#2d1a1a;--f1-accent:#ef4444;
    --tennis:#2d2a10;--tennis-accent:#d4a800;
    --football:#0f1e35;--football-accent:#3b82f6;
    --radius:12px;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

  header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{display:flex;align-items:baseline;gap:7px}
  .logo-name{font-family:var(--mono);font-weight:500;font-size:1rem;letter-spacing:-.02em}
  .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--cricket-accent);display:inline-block;margin-bottom:2px;animation:pulse-dot 2.4s ease-in-out infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  .header-right{display:flex;align-items:center;gap:8px}
  .tz-badge{font-family:var(--mono);font-size:.68rem;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .refresh-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--subtext);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;flex-shrink:0}
  .refresh-btn:hover:not(:disabled){border-color:var(--cricket-accent);color:var(--cricket-accent)}
  .refresh-btn:disabled{opacity:.4;cursor:not-allowed}
  .refresh-btn.spinning{animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .tabs-wrap{overflow-x:auto;scrollbar-width:none;padding:10px 16px 0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tabs{display:flex;gap:4px;padding-bottom:10px;width:max-content}
  .tab{font-family:var(--mono);font-size:.7rem;font-weight:500;padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--subtext);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.03em;text-transform:uppercase}
  .tab:hover{border-color:var(--muted);color:var(--text)}
  .tab.active[data-sport="all"]{background:var(--text);color:var(--bg);border-color:var(--text)}
  .tab.active[data-sport="cricket"]{background:var(--cricket-accent);color:#000;border-color:var(--cricket-accent)}
  .tab.active[data-sport="f1"]{background:var(--f1-accent);color:#fff;border-color:var(--f1-accent)}
  .tab.active[data-sport="tennis"]{background:var(--tennis-accent);color:#000;border-color:var(--tennis-accent)}
  .tab.active[data-sport="football"]{background:var(--football-accent);color:#fff;border-color:var(--football-accent)}

  .dates-wrap{overflow-x:auto;scrollbar-width:none;padding:10px 16px 0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
  .dates-wrap::-webkit-scrollbar{display:none}
  .dates{display:flex;gap:4px;padding-bottom:10px;width:max-content}
  .date-btn{font-family:var(--mono);font-size:.68rem;padding:5px 11px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--subtext);cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;min-width:52px}
  .date-btn .dnum{font-size:.82rem;font-weight:600;display:block;color:var(--text)}
  .date-btn .dday{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)}
  .date-btn:hover{border-color:var(--muted)}
  .date-btn.active{background:var(--surface);border-color:var(--text);color:var(--text)}
  .date-btn.today .dnum{color:var(--cricket-accent)}
  .date-btn.active.today{border-color:var(--cricket-accent)}

  .progress-bar-wrap{padding:0 16px 10px;display:none}
  .progress-bar-wrap.visible{display:block}
  .progress-track{background:var(--border);border-radius:4px;height:2px;overflow:hidden;margin-top:10px}
  .progress-fill{height:100%;background:var(--cricket-accent);border-radius:4px;transition:width .4s ease;width:0%}
  .progress-label{font-family:var(--mono);font-size:.63rem;color:var(--dim);margin-top:5px}

  .stale-banner{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;margin:10px 16px 0;padding:8px 12px;font-size:.75rem;color:#f87171;align-items:center;gap:8px}
  .stale-banner.hidden{display:none}
  .stale-banner:not(.hidden){display:flex}

  main{padding:0 16px 24px}
  .date-section-label{font-family:var(--mono);font-size:.68rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:10px}
  .date-section-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* EVENT CARD вАФ horizontal layout */
  .event-card{border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;transition:filter .15s;position:relative}
  .event-card.cricket {background:var(--cricket); border:1px solid rgba(34,197,94,.2)}
  .event-card.f1      {background:var(--f1);      border:1px solid rgba(239,68,68,.2)}
  .event-card.tennis  {background:var(--tennis);  border:1px solid rgba(212,168,0,.2)}
  .event-card.football{background:var(--football);border:1px solid rgba(59,130,246,.2)}
  .event-card:hover{filter:brightness(1.08)}

  .card-row{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center}
  .sport-icon{font-size:1.1rem;text-align:center}
  .event-meta{min-width:0}
  .event-name{font-size:.87rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .event-name .flag{font-size:.95rem}
  .event-comp{font-size:.72rem;color:var(--subtext)}
  .event-venue{font-size:.68rem;color:var(--dim);margin-top:3px}

  .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
  .event-time{font-family:var(--mono);font-size:.85rem;font-weight:500;color:var(--text);text-align:right;white-space:nowrap;line-height:1.2}
  .time-tz{font-size:.58rem;color:var(--dim);letter-spacing:.05em;text-transform:uppercase}
  .detail-link{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--subtext);text-decoration:none;font-size:.85rem;transition:all .15s}
  .detail-link:hover{background:rgba(255,255,255,.14);color:var(--text)}

  /* BROADCAST вАФ horizontal row like before, with wrap */
  .broadcast-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}
  .bc-item{background:rgba(0,0,0,.25);border-radius:7px;padding:6px 7px;min-width:0}
  .bc-country{font-size:.56rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
  .bc-channel{font-family:var(--mono);font-size:.66rem;color:var(--subtext);line-height:1.35;word-wrap:break-word;overflow-wrap:break-word;white-space:normal}

  .state-msg{text-align:center;padding:50px 20px;color:var(--dim);font-size:.85rem;line-height:1.7}
  .state-msg .icon{font-size:2.5rem;margin-bottom:12px}
  .last-updated{font-family:var(--mono);font-size:.63rem;color:var(--muted);text-align:center;padding:8px 0 4px}
  .disclaimer{font-size:.63rem;color:var(--muted);text-align:center;padding:2px 16px 16px;line-height:1.5}

  @media(max-width:360px){.broadcast-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

const DAYS      = 7;

// вФАвФАвФА DATE RIBBON вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function buildDateRibbon() {
  const ribbon = document.getElementById('dateRibbon');
  ribbon.innerHTML = '';
  const today = new Date();
  for (let i = 0; i < DAYS; i++) {
    const d   = new Date(today);
    d.setDate(today.getDate() + i);
    const key = toDateKey(d);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' today' : '') + (activeDate === key ? ' active' : '');
    btn.dataset.date = key;
    btn.innerHTML = `<span class="dnum">${d.getDate()}</span><span class="dday">${d.toLocaleDateString('en-GB',{weekday:'short'})}</span>`;
    btn.addEventListener('click', () => {
      activeDate = key;
      document.querySelectorAll('.date-btn').forEach(b => b.classList.toggle('active', b.dataset.date === key));
      renderEvents();
    });
    ribbon.appendChild(btn);
  }
}
function toDateKey(d) { return d.toLocaleDateString('en-CA'); }

// вФАвФАвФА INIT вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
(function init() {
  activeDate = toDateKey(new Date());
  buildDateRibbon();
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      activeSport = btn.dataset.sport;
      renderEvents();
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', () => fetchAll());

  const cached = loadCache();
  if (cached && cached.length) {
    allEvents = cached;
    renderEvents();
    const ts = parseInt(localStorage.getItem(CACHE_TS)||'0');
    const age = Date.now() - ts;
    if (age > 3 * 3600000) {
      document.getElementById('staleBanner').classList.remove('hidden');
    } else {
      const d = new Date(ts);
      document.getElementById('lastUpdated').textContent =
        `Cached ¬Ј ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ${d.toLocaleDateString([],{day:'numeric',month:'short'})}`;
    }
  } else {
    fetchAll();
  }
})();

// вФАвФАвФА CACHE вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function saveCache(events) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(events)); localStorage.setItem(CACHE_TS, Date.now()); } catch {}
}
function loadCache() {
  try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}

// вФАвФАвФА PROGRESS вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function setProgress(pct, label) {
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}
function hideProgress() { document.getElementById('progressWrap').classList.remove('visible'); }

// вФАвФАвФА MAIN FETCH вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
async function fetchAll() {
  if (isFetching) return;
  isFetching = true;
  lastFetchErrors = [];
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  document.getElementById('staleBanner').classList.add('hidden');

  const now    = new Date();
  const cutoff = new Date(now.getTime() + DAYS * 86400000);

  try {
    // Quick connectivity probe вАФ fail fast with a clear message if the
    // device has no real network path right now (common on iOS with
    // Private Relay / poor LTE / captive portals).
    setProgress(1, 'Checking connectionвА¶');
    const probeOk = await probeConnectivity();
    if (!probeOk) {
      throw new Error('No response from data sources вАФ your device may be offline, on a restricted network, or a privacy feature (like iCloud Private Relay) is blocking the request. Try switching networks or disabling Private Relay for this site.');
    }

    setProgress(4, 'F1 sessionsвА¶');
    const f1 = await fetchWithRetry(() => fetchF1(now, cutoff), 'F1');

    setProgress(10, 'Cricket fixturesвА¶');
    const cricket = await fetchByDay(CRICKET_LEAGUES, 'cricket', now, cutoff, filterCricket,
      (done, total) => setProgress(10 + Math.round((done/total)*28), `Cricket fixturesвА¶ (${done}/${total})`));

    setProgress(40, 'Tennis fixturesвА¶');
    const tennis = await fetchByDay(TENNIS_LEAGUES, 'tennis', now, cutoff, filterTennis,
      (done, total) => setProgress(40 + Math.round((done/total)*28), `Tennis fixturesвА¶ (${done}/${total})`));

    setProgress(70, 'Football fixturesвА¶');
    const football = await fetchByDay(FOOTBALL_LEAGUES, 'football', now, cutoff, null,
      (done, total) => setProgress(70 + Math.round((done/total)*28), `Football fixturesвА¶ (${done}/${total})`));

    setProgress(100, 'Done');
    allEvents = [...f1, ...cricket, ...tennis, ...football]
      .sort((a,b) => new Date(a.datetime_utc) - new Date(b.datetime_utc));

    saveCache(allEvents);
    buildDateRibbon();

    const ts = new Date();
    const counts = `рЯПП${cricket.length} рЯПО${f1.length} рЯОЊ${tennis.length} вЪљ${football.length}`;
    document.getElementById('lastUpdated').textContent =
      `Updated ${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ¬Ј ${ts.toLocaleDateString([],{day:'numeric',month:'short'})} ¬Ј ${counts}`;
    document.getElementById('disclaimer').textContent =
      'OpenF1 ¬Ј TheSportsDB ¬Ј Broadcast info hardcoded per competition.';

    renderEvents();
    setTimeout(hideProgress, 800);

  } catch(err) {
    hideProgress();
    logFetchError('fetchAll', err);
    if (!allEvents.length) {
      document.getElementById('main').innerHTML = `<div class="state-msg"><div class="icon">вЪ†пЄП</div>Could not load.<br><small style="color:var(--muted)">${escHtml(err.message)}</small></div>`;
    }
  } finally {
    isFetching = false;
    btn.disabled = false; btn.classList.remove('spinning');
  }
}

// Lightweight connectivity probe: try OpenF1 (simple, no params, tiny payload).
// If this fails, there's no point hammering 70+ TheSportsDB requests.
async function probeConnectivity() {
  try {
    const res = await fetch('https://api.openf1.org/v1/sessions?year=2024&session_key=latest', { cache: 'no-store' });
    return res.ok || res.status === 404; // any real HTTP response means network is fine
  } catch (err) {
    logFetchError('connectivity probe', err);
    return false;
  }
}

// Retry a fetch function once after a short delay if it returns zero results,
// to absorb transient blips (one bad request, brief network drop, etc.)
async function fetchWithRetry(fn, label) {
  let result = await fn();
  if (Array.isArray(result) && result.length === 0) {
    await new Promise(r => setTimeout(r, 1500));
    try {
      result = await fn();
    } catch (err) {
      logFetchError(`${label} retry`, err);
    }
  }
  return result;
}

// вФАвФАвФА F1 (OpenF1) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
async function fetchF1(from, to) {
  const years = new Set([from.getFullYear(), to.getFullYear()]);
  const events = [], seen = new Set();
  for (const year of years) {
    try {
      const res = await fetch(`https://api.openf1.org/v1/sessions?year=${year}`);
      if (!res.ok) continue;
      const sessions = await res.json();
      for (const s of sessions) {
        const dt = new Date(s.date_start);
        if (isNaN(dt)||dt<from||dt>to) continue;
        if (seen.has(s.session_key)) continue;
        seen.add(s.session_key);
        const stype = (s.session_type||s.session_name||'').toLowerCase();
        let bcKey = 'f1_race';
        if (stype.includes('qualifying'))    bcKey = 'f1_qualifying';
        else if (stype.includes('sprint'))   bcKey = 'f1_sprint';
        else if (stype.includes('practice')) bcKey = 'f1_practice';
        const country = s.country_name||s.location||'';
        const flag    = getFlag(country);
        events.push({
          id:`f1-${s.session_key}`, sport:'f1',
          name:s.session_name||s.session_type||'Session',
          flag, flagLabel:'',
          competition:`Formula 1 ${year} вАФ ${country}`,
          datetime_utc:s.date_start,
          city:s.location||'', country, venue:s.circuit_short_name||'',
          broadcast:BC[bcKey],
        });
      }
    } catch (err) { logFetchError('F1/OpenF1', err); }
  }
  return events;
}

// вФАвФАвФА FILTERS вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function filterCricket(name, leagueName) {
  const n = name.toLowerCase();
  return CRICKET_NATIONS.some(nat => n.includes(nat));
}
function filterTennis(name, leagueName) {
  const n = (name+' '+leagueName).toLowerCase();
  return TENNIS_TIER1_KEYWORDS.some(kw => n.includes(kw));
}

// вФАвФАвФА GENERIC DAY-BY-DAY FETCH (cricket, tennis, football) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
// Throttled: TheSportsDB free tier = 30 requests/minute. We batch requests in
// small groups with a short delay between batches to stay well under that limit.
const TSDB_BATCH_SIZE  = 6;     // requests per batch
const TSDB_BATCH_DELAY = 1100;  // ms between batches

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchByDay(leagues, sport, from, to, filterFn, progressCb) {
  const events = [], seen = new Set();
  const days   = Math.min(Math.ceil((to-from)/86400000)+1, 31);
  const dates  = [];
  for (let i=0;i<days;i++) {
    const d = new Date(from.getTime()+i*86400000);
    dates.push(d.toISOString().split('T')[0]);
  }

  const tasks = [];
  for (const dateStr of dates) {
    for (const league of leagues) {
      tasks.push({dateStr, league});
    }
  }

  let errorCount = 0;

  for (let i = 0; i < tasks.length; i += TSDB_BATCH_SIZE) {
    const batch = tasks.slice(i, i + TSDB_BATCH_SIZE);

    await Promise.allSettled(batch.map(async ({dateStr, league}) => {
      try {
        const res = await fetch(`${TSDB}/eventsday.php?d=${dateStr}&l=${league.id}`);
        if (res.status === 429) { errorCount++; return; }
        if (!res.ok) return;
        const data = await res.json();
        if (!data.events) return;
        for (const ev of data.events) {
          if (seen.has(ev.idEvent)) continue;
          const dt = parseTSDBDate(ev.dateEvent, ev.strTime);
          if (!dt||dt<from||dt>to) continue;

          const name = ev.strEvent || [ev.strHomeTeam, ev.strAwayTeam].filter(Boolean).join(' vs ') || 'Match';
          const leagueName = ev.strLeague || league.name;

          if (filterFn && !filterFn(name, leagueName)) continue;
          seen.add(ev.idEvent);

          let bcKey = league.bcKey;
          if (sport === 'tennis') {
            const n = (name+' '+leagueName).toLowerCase();
            if (n.includes('australian open'))                        bcKey = 'tennis_ao';
            else if (n.includes('french open')||n.includes('roland'))  bcKey = 'tennis_fo';
            else if (n.includes('wimbledon'))                          bcKey = 'tennis_wimbledon';
            else if (n.includes('us open'))                            bcKey = 'tennis_uso';
          }

          const flagInfo = buildSingleFlag(sport, name, ev);

          events.push({
            id:`tsdb-${ev.idEvent}`, sport, name,
            flag: flagInfo.flag, flagLabel: flagInfo.label,
            competition: leagueName,
            datetime_utc: dt.toISOString(),
            city: ev.strCity||'', country: ev.strCountry||'',
            venue: ev.strVenue||'',
            broadcast: BC[bcKey]||{uk:'TBC',us:'TBC',aus:'TBC',canada:'TBC'},
          });
        }
      } catch (err) { errorCount++; logFetchError(`TheSportsDB ${sport} (${league.name}, ${dateStr})`, err); }
    }));

    if (progressCb) progressCb(i + batch.length, tasks.length);

    if (i + TSDB_BATCH_SIZE < tasks.length) {
      await sleep(TSDB_BATCH_DELAY);
    }
  }

  if (errorCount > tasks.length / 2) {
    console.warn(`${sport}: high error rate (${errorCount}/${tasks.length}) вАФ possible rate limiting`);
  }

  return events;
}

// вФАвФАвФА SINGLE FLAG LOGIC вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function buildSingleFlag(sport, name, ev) {
  if (sport === 'cricket' || sport === 'football') {
    const home = ev.strHomeTeam || (name.split(' vs ')[0]||'').trim();
    const f = getFlag(home);
    if (f) return {flag:f, label:home};
  } else if (sport === 'tennis') {
    const first = name.replace(' / ',' vs ').split(' vs ')[0]?.trim() || '';
    const f = getFlag(first);
    if (f) return {flag:f, label:first};
  }
  return {flag:'', label:''};
}

// вФАвФАвФА HELPERS вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function parseTSDBDate(dateStr, timeStr) {
  if (!dateStr) return null;
  const t = (timeStr && timeStr !== '00:00:00') ? timeStr : '12:00:00';
  const dt = new Date(`${dateStr}T${t}Z`);
  return isNaN(dt) ? null : dt;
}

// вФАвФАвФА RENDER вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const ICONS = {cricket:'рЯПП', f1:'рЯПО', tennis:'рЯОЊ', football:'вЪљ'};

function renderEvents() {
  const main   = document.getElementById('main');
  let filtered = activeSport === 'all' ? allEvents : allEvents.filter(e => e.sport === activeSport);

  if (activeDate) {
    filtered = filtered.filter(e => toDateKey(new Date(e.datetime_utc)) === activeDate);
  }

  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.date === activeDate);
  });

  if (!filtered.length && allEvents.length > 0) {
    main.innerHTML = `<div class="state-msg"><div class="icon">рЯУЕ</div>No events on this day.<br><small>Try another date or the All sports tab.</small></div>`;
    return;
  }
  if (!filtered.length) {
    const errDetail = lastFetchErrors.length
      ? `<br><br><small style="color:var(--muted)">${escHtml(lastFetchErrors.slice(0,3).join(' ¬Ј '))}</small>`
      : '';
    main.innerHTML = `<div class="state-msg"><div class="icon">вЪ†пЄП</div>No fixtures loaded.<br><small>Check your internet connection and tap вЖї to retry.<br><br>If opening this file directly (file://) some browsers block these requests вАФ try hosting it on GitHub Pages instead.</small>${errDetail}</div>`;
    return;
  }

  main.innerHTML = filtered.map(ev => card(ev)).join('');
}

function card(ev) {
  const localDt  = new Date(ev.datetime_utc);
  const timeStr  = localDt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const bc       = ev.broadcast||{};
  const searchQ  = encodeURIComponent(ev.name + ' ' + (ev.competition||''));
  const searchURL= `https://www.google.com/search?q=${searchQ}`;

  const venueParts = [ev.venue, ev.city, ev.country].filter(Boolean);
  // de-dupe consecutive repeats (e.g. city === country name match)
  const venueHtml = [...new Set(venueParts)].join(', ');

  const bcItems = [
    {label:'UK',  val:bc.uk    ||'TBC'},
    {label:'US',  val:bc.us    ||'TBC'},
    {label:'AUS', val:bc.aus   ||'TBC'},
    {label:'CA',  val:bc.canada||'TBC'},
  ];
  const bcHtml = bcItems.map(b =>
    `<div class="bc-item"><div class="bc-country">${b.label}</div><div class="bc-channel">${escHtml(b.val)}</div></div>`
  ).join('');

  const flagHtml = ev.flag ? `<span class="flag">${ev.flag}</span>` : '';

  return `<div class="event-card ${escHtml(ev.sport)}">
    <div class="card-row">
      <span class="sport-icon">${ICONS[ev.sport]||'рЯПЖ'}</span>
      <div class="event-meta">
        <div class="event-name">${flagHtml}${escHtml(ev.name)}</div>
        <div class="event-comp">${escHtml(ev.competition)}</div>
        ${venueHtml ? `<div class="event-venue">рЯУН ${escHtml(venueHtml)}</div>` : ''}
      </div>
      <div class="card-right">
        <div class="event-time">${timeStr}<br><span class="time-tz">${tzAbbr}</span></div>
        <a class="detail-link" href="${searchURL}" target="_blank" rel="noopener" title="View details">¬ї</a>
      </div>
    </div>
    <div class="broadcast-row">${bcHtml}</div>
  </div>`;
}

function escHtml(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
