<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SportPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0c0f14;--surface:#141820;--border:#242a35;--muted:#3d4557;--dim:#6b7590;
    --text:#e8ecf4;--subtext:#8a93aa;
    --cricket:#1a3a2a;--cricket-accent:#22c55e;
    --f1:#2d1a1a;--f1-accent:#ef4444;
    --tennis:#2d2a10;--tennis-accent:#d4a800;
    --football:#0f1e35;--football-accent:#3b82f6;
    --radius:12px;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{display:flex;align-items:baseline;gap:7px}
  .logo-name{font-family:var(--mono);font-weight:500;font-size:1rem;letter-spacing:-.02em}
  .logo-dot{width:7px;height:7px;border-radius:50%;background:var(--cricket-accent);display:inline-block;margin-bottom:2px;animation:pulse-dot 2.4s ease-in-out infinite}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  .header-right{display:flex;align-items:center;gap:8px}
  .tz-badge{font-family:var(--mono);font-size:.68rem;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 7px;white-space:nowrap}
  .refresh-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--subtext);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;flex-shrink:0}
  .refresh-btn:hover:not(:disabled){border-color:var(--cricket-accent);color:var(--cricket-accent)}
  .refresh-btn:disabled{opacity:.4;cursor:not-allowed}
  .refresh-btn.spinning{animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* SPORT TABS */
  .tabs-wrap{overflow-x:auto;scrollbar-width:none;padding:10px 16px 0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
  .tabs-wrap::-webkit-scrollbar{display:none}
  .tabs{display:flex;gap:4px;padding-bottom:10px;width:max-content}
  .tab{font-family:var(--mono);font-size:.7rem;font-weight:500;padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--subtext);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.03em;text-transform:uppercase}
  .tab:hover{border-color:var(--muted);color:var(--text)}
  .tab.active[data-sport="all"]{background:var(--text);color:var(--bg);border-color:var(--text)}
  .tab.active[data-sport="cricket"]{background:var(--cricket-accent);color:#000;border-color:var(--cricket-accent)}
  .tab.active[data-sport="f1"]{background:var(--f1-accent);color:#fff;border-color:var(--f1-accent)}
  .tab.active[data-sport="tennis"]{background:var(--tennis-accent);color:#000;border-color:var(--tennis-accent)}
  .tab.active[data-sport="football"]{background:var(--football-accent);color:#fff;border-color:var(--football-accent)}

  /* DATE RIBBON */
  .dates-wrap{overflow-x:auto;scrollbar-width:none;padding:10px 16px 0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
  .dates-wrap::-webkit-scrollbar{display:none}
  .dates{display:flex;gap:4px;padding-bottom:10px;width:max-content}
  .date-btn{font-family:var(--mono);font-size:.68rem;padding:5px 11px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--subtext);cursor:pointer;white-space:nowrap;transition:all .15s;text-align:center;min-width:52px}
  .date-btn .dnum{font-size:.82rem;font-weight:600;display:block;color:var(--text)}
  .date-btn .dday{font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--dim)}
  .date-btn:hover{border-color:var(--muted)}
  .date-btn.active{background:var(--surface);border-color:var(--text);color:var(--text)}
  .date-btn.active .dnum{color:var(--text)}
  .date-btn.today .dnum{color:var(--cricket-accent)}
  .date-btn.active.today{border-color:var(--cricket-accent)}

  /* PROGRESS */
  .progress-bar-wrap{padding:0 16px 10px;display:none}
  .progress-bar-wrap.visible{display:block}
  .progress-track{background:var(--border);border-radius:4px;height:2px;overflow:hidden;margin-top:10px}
  .progress-fill{height:100%;background:var(--cricket-accent);border-radius:4px;transition:width .4s ease;width:0%}
  .progress-label{font-family:var(--mono);font-size:.63rem;color:var(--dim);margin-top:5px}

  /* STALE BANNER */
  .stale-banner{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;margin:10px 16px 0;padding:8px 12px;font-size:.75rem;color:#f87171;display:flex;align-items:center;gap:8px}
  .stale-banner.hidden{display:none!important}

  /* MAIN */
  main{padding:0 16px 24px}
  .date-group{margin-bottom:4px}
  .date-section-label{font-family:var(--mono);font-size:.68rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:10px}
  .date-section-label::after{content:'';flex:1;height:1px;background:var(--border)}

  /* EVENT CARD */
  .event-card{border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;transition:filter .15s;position:relative;overflow:hidden}
  .event-card.cricket {background:var(--cricket); border:1px solid rgba(34,197,94,.2)}
  .event-card.f1      {background:var(--f1);      border:1px solid rgba(239,68,68,.2)}
  .event-card.tennis  {background:var(--tennis);  border:1px solid rgba(212,168,0,.2)}
  .event-card.football{background:var(--football);border:1px solid rgba(59,130,246,.2)}
  .event-card:hover{filter:brightness(1.08)}

  .card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
  .sport-icon{font-size:1.15rem;flex-shrink:0;margin-top:1px}
  .event-meta{min-width:0;flex:1}
  .event-name{font-size:.87rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
  .event-flags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
  .flag-chip{font-size:.78rem;display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);border-radius:4px;padding:1px 5px;font-size:.72rem;color:var(--subtext)}
  .event-comp{font-size:.72rem;color:var(--subtext)}
  .event-venue{font-size:.7rem;color:var(--dim);margin-top:2px}

  .card-time-search{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .event-time{font-family:var(--mono);font-size:.88rem;font-weight:500;color:var(--text);text-align:right;white-space:nowrap}
  .time-tz{font-size:.6rem;color:var(--dim);letter-spacing:.05em;text-transform:uppercase}
  .search-link{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--subtext);text-decoration:none;font-size:.8rem;transition:all .15s;flex-shrink:0}
  .search-link:hover{background:rgba(255,255,255,.14);color:var(--text)}

  /* BROADCAST ROW */
  .broadcast-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
  .bc-item{background:rgba(0,0,0,.25);border-radius:7px;padding:5px 6px}
  .bc-country{font-size:.55rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .bc-channel{font-family:var(--mono);font-size:.66rem;color:var(--subtext);line-height:1.3;word-break:break-word}

  /* STATES */
  .state-msg{text-align:center;padding:50px 20px;color:var(--dim);font-size:.85rem;line-height:1.7}
  .state-msg .icon{font-size:2.5rem;margin-bottom:12px}
  .last-updated{font-family:var(--mono);font-size:.63rem;color:var(--muted);text-align:center;padding:8px 0 4px}
  .disclaimer{font-size:.63rem;color:var(--muted);text-align:center;padding:2px 16px 16px;line-height:1.5}

  @media(max-width:380px){.broadcast-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span><span class="logo-name">SportPulse</span></div>
  <div class="header-right">
    <span class="tz-badge" id="tzBadge">…</span>
    <button class="refresh-btn" id="refreshBtn" title="Refresh schedule">↻</button>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-sport="all">All</button>
    <button class="tab" data-sport="cricket">🏏 Cricket</button>
    <button class="tab" data-sport="f1">🏎 F1</button>
    <button class="tab" data-sport="tennis">🎾 Tennis</button>
    <button class="tab" data-sport="football">⚽ Football</button>
  </div>
</div>

<div class="dates-wrap"><div class="dates" id="dateRibbon"></div></div>

<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div class="stale-banner hidden" id="staleBanner">
  ⚠️ Showing cached data — tap ↻ to refresh
</div>

<main id="main">
  <div class="state-msg"><div class="icon">📡</div>Loading schedule…</div>
</main>

<div class="last-updated" id="lastUpdated"></div>
<div class="disclaimer" id="disclaimer"></div>

<script>
// ─── BROADCAST CHANNELS ───────────────────────────────────────────────────────
const BC = {
  cricket_test:     {uk:'Sky Sports Cricket', us:'Willow TV',              aus:'Fox Cricket\nChannel 9', canada:'Willow TV'},
  cricket_ipl:      {uk:'Sky Sports Cricket', us:'JioCinema',              aus:'Fox Cricket',            canada:'N/A'},
  cricket_icc:      {uk:'Sky Sports Cricket', us:'Willow TV',              aus:'Fox Cricket\nChannel 9', canada:'Willow TV'},
  cricket_odi:      {uk:'Sky Sports Cricket', us:'Willow TV',              aus:'Fox Cricket',            canada:'Willow TV'},
  cricket_t20i:     {uk:'Sky Sports Cricket', us:'Willow TV',              aus:'Fox Cricket',            canada:'Willow TV'},
  f1_race:          {uk:'Sky Sports F1\nChannel 4', us:'ESPN',             aus:'Fox Sports 506',         canada:'TSN / RDS'},
  f1_qualifying:    {uk:'Sky Sports F1\nChannel 4', us:'ESPN',             aus:'Fox Sports 506',         canada:'TSN / RDS'},
  f1_sprint:        {uk:'Sky Sports F1',       us:'ESPN',                  aus:'Fox Sports 506',         canada:'TSN'},
  f1_practice:      {uk:'Sky Sports F1',       us:'ESPN+',                 aus:'Fox Sports 506',         canada:'TSN+'},
  tennis_ao:        {uk:'Eurosport\nDiscovery+', us:'ESPN\nTennis Channel',aus:'Ch.9 / Stan Sport',      canada:'TSN / RDS'},
  tennis_fo:        {uk:'Eurosport / ITV4',    us:'NBC / Peacock\nTennis Ch.', aus:'Stan Sport',         canada:'TSN'},
  tennis_wimbledon: {uk:'BBC / Sky Sports',    us:'ESPN',                  aus:'Stan Sport',             canada:'TSN'},
  tennis_uso:       {uk:'Sky Sports Tennis',   us:'ESPN / ESPN+',          aus:'Stan Sport',             canada:'TSN'},
  tennis_masters:   {uk:'Sky Sports\nAmazon Prime', us:'Tennis Ch.\nESPN+',aus:'Stan Sport',             canada:'TSN'},
  football_wc:      {uk:'ITV / BBC',           us:'Fox / FS1\nTelemundo',  aus:'SBS',                    canada:'TSN / CTV'},
  football_euros:   {uk:'ITV / BBC\nChannel 4',us:'HBO Max / TNT',         aus:'Optus Sport',            canada:'TSN / CTV'},
};

// ─── TSDB CONFIG ──────────────────────────────────────────────────────────────
const TSDB = 'https://www.thesportsdb.com/api/v1/json/123';

const CRICKET_LEAGUES = [
  {id:'4655',name:'Test Cricket',               bcKey:'cricket_test'},
  {id:'4659',name:'Indian Premier League',       bcKey:'cricket_ipl'},
  {id:'4646',name:'ICC Cricket World Cup',       bcKey:'cricket_icc'},
  {id:'4648',name:'ICC World Twenty20',          bcKey:'cricket_icc'},
  {id:'4649',name:'ICC Champions Trophy',        bcKey:'cricket_icc'},
  {id:'4652',name:'International T20',           bcKey:'cricket_t20i'},
  {id:'4651',name:'One Day Internationals',      bcKey:'cricket_odi'},
];
const TENNIS_LEAGUES = [
  {id:'4681',name:'Australian Open',   bcKey:'tennis_ao'},
  {id:'4680',name:'French Open',       bcKey:'tennis_fo'},
  {id:'4682',name:'Wimbledon',         bcKey:'tennis_wimbledon'},
  {id:'4683',name:'US Open Tennis',    bcKey:'tennis_uso'},
  {id:'4684',name:'WTA Tour',          bcKey:'tennis_masters'},
  {id:'4685',name:'ATP Tour',          bcKey:'tennis_masters'},
];

// ─── CRICKET: show only if one team is in this list ───────────────────────────
const CRICKET_NATIONS = ['india','australia','england','new zealand','south africa','pakistan','sri lanka','west indies','bangladesh','zimbabwe','ireland','afghanistan'];

// ─── TENNIS: show only grand slams + atp/wta masters ────────────────────────
const TENNIS_TIER1_KEYWORDS = ['australian open','french open','roland garros','wimbledon','us open','masters','atp 1000','wta 1000','atp finals','wta finals'];

// ─── COUNTRY → FLAG MAP ───────────────────────────────────────────────────────
const COUNTRY_FLAG = {
  'india':'🇮🇳','australia':'🇦🇺','england':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','new zealand':'🇳🇿','south africa':'🇿🇦',
  'pakistan':'🇵🇰','sri lanka':'🇱🇰','west indies':'🏝','bangladesh':'🇧🇩','zimbabwe':'🇿🇼',
  'ireland':'🇮🇪','afghanistan':'🇦🇫','united states':'🇺🇸','usa':'🇺🇸','canada':'🇨🇦',
  'france':'🇫🇷','germany':'🇩🇪','spain':'🇪🇸','italy':'🇮🇹','brazil':'🇧🇷','argentina':'🇦🇷',
  'netherlands':'🇳🇱','portugal':'🇵🇹','mexico':'🇲🇽','japan':'🇯🇵','china':'🇨🇳',
  'monaco':'🇲🇨','bahrain':'🇧🇭','saudi arabia':'🇸🇦','uae':'🇦🇪','singapore':'🇸🇬',
  'malaysia':'🇲🇾','hungary':'🇭🇺','belgium':'🇧🇪','austria':'🇦🇹','switzerland':'🇨🇭',
  'britain':'🇬🇧','united kingdom':'🇬🇧','great britain':'🇬🇧','uk':'🇬🇧',
  'emilia':'🇮🇹','miami':'🇺🇸','las vegas':'🇺🇸','texas':'🇺🇸','mexico city':'🇲🇽',
  'sao paulo':'🇧🇷','interlagos':'🇧🇷','suzuka':'🇯🇵','shanghai':'🇨🇳','barcelona':'🇪🇸',
  'baku':'🇦🇿','azerbaijan':'🇦🇿','qatar':'🇶🇦','abu dhabi':'🇦🇪','imola':'🇮🇹',
  'serbia':'🇷🇸','djokovic':'🇷🇸','alcaraz':'🇪🇸','sinner':'🇮🇹','zverev':'🇩🇪',
  'nadal':'🇪🇸','federer':'🇨🇭','murray':'🇬🇧','swiatek':'🇵🇱','poland':'🇵🇱',
  'rybakina':'🇰🇿','kazakhstan':'🇰🇿','gauff':'🇺🇸','sabalenka':'🇧🇾','belarus':'🇧🇾',
};

function getFlag(text) {
  if (!text) return '';
  const t = text.toLowerCase();
  for (const [key, flag] of Object.entries(COUNTRY_FLAG)) {
    if (t.includes(key)) return flag;
  }
  return '';
}

// ─── TIMEZONE ────────────────────────────────────────────────────────────────
const userTZ   = Intl.DateTimeFormat().resolvedOptions().timeZone;
const tzAbbr   = (() => {
  try {
    const s = new Intl.DateTimeFormat('en', {timeZone:userTZ, timeZoneName:'short'}).format(new Date());
    return s.split(' ').pop();
  } catch { return userTZ.split('/').pop().replace('_',' '); }
})();
document.getElementById('tzBadge').textContent = tzAbbr;

// ─── STATE ────────────────────────────────────────────────────────────────────
let allEvents    = [];
let activeSport  = 'all';
let activeDate   = null; // YYYY-MM-DD string
let isFetching   = false;
const CACHE_KEY  = 'sportpulse_cache';
const CACHE_TS   = 'sportpulse_cache_ts';
const DAYS       = 14;

// ─── DATE RIBBON ─────────────────────────────────────────────────────────────
function buildDateRibbon() {
  const ribbon = document.getElementById('dateRibbon');
  ribbon.innerHTML = '';
  const today = new Date();

  for (let i = 0; i < DAYS; i++) {
    const d   = new Date(today);
    d.setDate(today.getDate() + i);
    const key = toDateKey(d);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' today' : '') + (activeDate === key ? ' active' : '');
    btn.dataset.date = key;
    btn.innerHTML = `<span class="dnum">${d.getDate()}</span><span class="dday">${d.toLocaleDateString('en-GB',{weekday:'short'})}</span>`;
    btn.addEventListener('click', () => {
      activeDate = key;
      document.querySelectorAll('.date-btn').forEach(b => b.classList.toggle('active', b.dataset.date === key));
      renderEvents();
    });
    ribbon.appendChild(btn);
  }
}

function toDateKey(d) {
  return d.toLocaleDateString('en-CA'); // YYYY-MM-DD
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  activeDate = toDateKey(new Date());
  buildDateRibbon();
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      activeSport = btn.dataset.sport;
      renderEvents();
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', () => fetchAll(true));

  // Load from cache immediately, then auto-fetch if stale
  const cached = loadCache();
  if (cached && cached.length) {
    allEvents = cached;
    renderEvents();
    const ts = parseInt(localStorage.getItem(CACHE_TS)||'0');
    const age = Date.now() - ts;
    if (age > 3 * 3600000) { // stale if > 3 hours
      document.getElementById('staleBanner').classList.remove('hidden');
    } else {
      const d = new Date(ts);
      document.getElementById('lastUpdated').textContent =
        `Cached · ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ${d.toLocaleDateString([],{day:'numeric',month:'short'})}`;
    }
  } else {
    fetchAll(false);
  }
})();

// ─── CACHE ────────────────────────────────────────────────────────────────────
function saveCache(events) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(events)); localStorage.setItem(CACHE_TS, Date.now()); } catch {}
}
function loadCache() {
  try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}
function hideProgress() { document.getElementById('progressWrap').classList.remove('visible'); }

// ─── MAIN FETCH ───────────────────────────────────────────────────────────────
async function fetchAll(manual) {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.classList.add('spinning');
  document.getElementById('staleBanner').classList.add('hidden');

  const now    = new Date();
  const cutoff = new Date(now.getTime() + DAYS * 86400000);

  try {
    setProgress(5, 'F1 sessions…');
    const f1 = await fetchF1(now, cutoff);

    setProgress(30, 'Cricket fixtures…');
    const cricket = await fetchTSDBLeagues(CRICKET_LEAGUES, 'cricket', now, cutoff);

    setProgress(58, 'Tennis fixtures…');
    const tennis = await fetchTSDBLeagues(TENNIS_LEAGUES, 'tennis', now, cutoff);

    setProgress(75, 'FIFA World Cup…');
    const wc = await fetchFootballByDay('4429', 'FIFA World Cup 2026', 'football_wc', now, cutoff);

    setProgress(90, 'UEFA Euros…');
    const euros = await fetchTSDBLeagues([{id:'4608',name:'UEFA European Championship',bcKey:'football_euros'}], 'football', now, cutoff);

    setProgress(100, 'Done');
    allEvents = [...f1,...cricket,...tennis,...wc,...euros]
      .sort((a,b) => new Date(a.datetime_utc) - new Date(b.datetime_utc));

    saveCache(allEvents);
    buildDateRibbon(); // rebuild to reflect today

    const ts = new Date();
    document.getElementById('lastUpdated').textContent =
      `Updated ${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${ts.toLocaleDateString([],{day:'numeric',month:'short'})}`;
    document.getElementById('disclaimer').textContent =
      'OpenF1 · TheSportsDB · Broadcast info hardcoded per competition.';

    renderEvents();
    setTimeout(hideProgress, 800);

  } catch(err) {
    hideProgress();
    if (!allEvents.length) {
      document.getElementById('main').innerHTML = `<div class="state-msg"><div class="icon">⚠️</div>Could not load.<br><small style="color:var(--muted)">${escHtml(err.message)}</small></div>`;
    }
  } finally {
    isFetching = false;
    btn.disabled = false; btn.classList.remove('spinning');
  }
}

// ─── F1 (OpenF1) ──────────────────────────────────────────────────────────────
async function fetchF1(from, to) {
  const years = new Set([from.getFullYear(), to.getFullYear()]);
  const events = [], seen = new Set();
  for (const year of years) {
    try {
      const res = await fetch(`https://api.openf1.org/v1/sessions?year=${year}`);
      if (!res.ok) continue;
      const sessions = await res.json();
      for (const s of sessions) {
        const dt = new Date(s.date_start);
        if (isNaN(dt)||dt<from||dt>to) continue;
        if (seen.has(s.session_key)) continue;
        seen.add(s.session_key);
        const stype = (s.session_type||s.session_name||'').toLowerCase();
        let bcKey = 'f1_race';
        if (stype.includes('qualifying'))    bcKey = 'f1_qualifying';
        else if (stype.includes('sprint'))   bcKey = 'f1_sprint';
        else if (stype.includes('practice')) bcKey = 'f1_practice';
        const country = s.country_name||s.location||'';
        const flag    = getFlag(country) || getFlag(s.circuit_short_name||'');
        events.push({
          id:`f1-${s.session_key}`, sport:'f1',
          name:`${country} — ${s.session_name||s.session_type||'Session'}`,
          competition:`Formula 1 ${year}`,
          datetime_utc:s.date_start,
          city:s.location||'', country,
          flags:[{flag, label:country}],
          broadcast:BC[bcKey], source:'OpenF1',
        });
      }
    } catch {}
  }
  return events;
}

// ─── TSDB NEXT-LEAGUE ────────────────────────────────────────────────────────
async function fetchTSDBLeagues(leagues, sport, from, to) {
  const events = [], seen = new Set();
  await Promise.allSettled(leagues.map(async league => {
    try {
      const res  = await fetch(`${TSDB}/eventsnextleague.php?id=${league.id}`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.events) return;
      for (const ev of data.events) {
        const dt = parseTSDBDate(ev.dateEvent, ev.strTime);
        if (!dt||dt<from||dt>to) continue;
        if (seen.has(ev.idEvent)) continue;

        const name     = ev.strEvent||'Match';
        const leagueName = ev.strLeague||league.name;

        // Cricket filter — require a major nation
        if (sport === 'cricket') {
          const n = name.toLowerCase();
          if (!CRICKET_NATIONS.some(nat => n.includes(nat))) continue;
        }

        // Tennis filter — grand slams + masters only
        if (sport === 'tennis') {
          const n = (name+' '+leagueName).toLowerCase();
          if (!TENNIS_TIER1_KEYWORDS.some(kw => n.includes(kw))) continue;
        }

        seen.add(ev.idEvent);

        // Broadcast key refinement for tennis
        let bcKey = league.bcKey;
        if (sport === 'tennis') {
          const n = (name+' '+leagueName).toLowerCase();
          if (n.includes('australian open'))                     bcKey = 'tennis_ao';
          else if (n.includes('french open')||n.includes('roland')) bcKey = 'tennis_fo';
          else if (n.includes('wimbledon'))                      bcKey = 'tennis_wimbledon';
          else if (n.includes('us open'))                        bcKey = 'tennis_uso';
        }

        // Build flags
        const flags = buildFlags(sport, name, ev);

        events.push({
          id:`tsdb-${ev.idEvent}`, sport, name, competition:leagueName,
          datetime_utc:dt.toISOString(),
          city:ev.strCity||'', country:ev.strCountry||ev.strVenue||'',
          flags,
          broadcast:BC[bcKey]||{uk:'TBC',us:'TBC',aus:'TBC',canada:'TBC'},
          source:'TheSportsDB',
        });
      }
    } catch {}
  }));
  return events;
}

// ─── FOOTBALL BY DAY ─────────────────────────────────────────────────────────
async function fetchFootballByDay(leagueId, compName, bcKey, from, to) {
  const events = [], seen = new Set();
  const days   = Math.min(Math.ceil((to-from)/86400000), 30);
  const dates  = [];
  for (let i=0;i<days;i++) {
    const d = new Date(from.getTime()+i*86400000);
    dates.push(d.toISOString().split('T')[0]);
  }
  await Promise.allSettled(dates.map(async dateStr => {
    try {
      const res = await fetch(`${TSDB}/eventsday.php?d=${dateStr}&l=${leagueId}`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.events) return;
      for (const ev of data.events) {
        if (seen.has(ev.idEvent)) continue;
        seen.add(ev.idEvent);
        const dt = parseTSDBDate(ev.dateEvent, ev.strTime);
        if (!dt) continue;
        const name = ev.strEvent||'Match';
        const flags = buildFlags('football', name, ev);
        events.push({
          id:`tsdb-${ev.idEvent}`, sport:'football', name, competition:compName,
          datetime_utc:dt.toISOString(),
          city:ev.strCity||'', country:ev.strCountry||ev.strVenue||'',
          flags,
          broadcast:BC[bcKey]||{uk:'TBC',us:'TBC',aus:'TBC',canada:'TBC'},
          source:'TheSportsDB',
        });
      }
    } catch {}
  }));
  return events;
}

// ─── BUILD FLAGS ─────────────────────────────────────────────────────────────
function buildFlags(sport, name, ev) {
  const flags = [];
  if (sport === 'cricket' || sport === 'football') {
    // home vs away team name → flag
    const home = ev.strHomeTeam||'';
    const away = ev.strAwayTeam||'';
    const fh = getFlag(home)||getFlag(name.split(' vs ')[0]||'');
    const fa = getFlag(away)||getFlag((name.split(' vs ')[1]||'').split(' - ')[0]||'');
    if (fh) flags.push({flag:fh, label:home});
    if (fa) flags.push({flag:fa, label:away});
  } else if (sport === 'tennis') {
    // parse "Player1 vs Player2" or "Player1 / Player2"
    const parts = name.replace(' / ',' vs ').split(' vs ');
    parts.forEach(p => { const f = getFlag(p.trim()); if (f) flags.push({flag:f, label:p.trim()}); });
  } else if (sport === 'f1') {
    // handled in fetchF1
  }
  return flags;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseTSDBDate(dateStr, timeStr) {
  if (!dateStr) return null;
  const t = (timeStr && timeStr !== '00:00:00') ? timeStr : '12:00:00';
  const dt = new Date(`${dateStr}T${t}Z`);
  return isNaN(dt) ? null : dt;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const ICONS = {cricket:'🏏', f1:'🏎', tennis:'🎾', football:'⚽'};

function renderEvents() {
  const main     = document.getElementById('main');
  let filtered   = activeSport === 'all' ? allEvents : allEvents.filter(e => e.sport === activeSport);

  // Filter by selected date
  if (activeDate) {
    filtered = filtered.filter(e => {
      const local = new Date(e.datetime_utc);
      return toDateKey(local) === activeDate;
    });
  }

  // Highlight active date button
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.date === activeDate);
  });

  if (!filtered.length && allEvents.length > 0) {
    main.innerHTML = `<div class="state-msg"><div class="icon">📅</div>No events on this day.<br><small>Try another date or the All sports tab.</small></div>`;
    return;
  }
  if (!filtered.length) {
    main.innerHTML = `<div class="state-msg"><div class="icon">📡</div>Loading…</div>`;
    return;
  }

  main.innerHTML = filtered.map(ev => card(ev)).join('');
}

function card(ev) {
  const localDt  = new Date(ev.datetime_utc);
  const timeStr  = localDt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const bc       = ev.broadcast||{};
  const searchQ  = encodeURIComponent(ev.name + ' ' + (ev.competition||''));
  const searchURL= `https://www.google.com/search?q=${searchQ}`;

  const flagsHtml = (ev.flags||[]).map(f =>
    `<span class="flag-chip">${f.flag} ${escHtml(f.label)}</span>`
  ).join('');

  const venueHtml = [ev.city, ev.country].filter(Boolean).join(', ');

  const bcItems = [
    {label:'UK',  val:bc.uk    ||'TBC'},
    {label:'US',  val:bc.us    ||'TBC'},
    {label:'AUS', val:bc.aus   ||'TBC'},
    {label:'CA',  val:bc.canada||'TBC'},
  ];
  const bcHtml = bcItems.map(b =>
    `<div class="bc-item"><div class="bc-country">${b.label}</div><div class="bc-channel">${escHtml(b.val)}</div></div>`
  ).join('');

  return `<div class="event-card ${escHtml(ev.sport)}">
    <div class="card-top">
      <span class="sport-icon">${ICONS[ev.sport]||'🏆'}</span>
      <div class="event-meta">
        <div class="event-name">${escHtml(ev.name)}</div>
        ${flagsHtml ? `<div class="event-flags">${flagsHtml}</div>` : ''}
        <div class="event-comp">${escHtml(ev.competition)}</div>
        ${venueHtml ? `<div class="event-venue">📍 ${escHtml(venueHtml)}</div>` : ''}
      </div>
      <div class="card-time-search">
        <div class="event-time">${timeStr}<br><span class="time-tz">${tzAbbr}</span></div>
        <a class="search-link" href="${searchURL}" target="_blank" rel="noopener" title="Search on Google">🔍</a>
      </div>
    </div>
    <div class="broadcast-row">${bcHtml}</div>
  </div>`;
}

function escHtml(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
